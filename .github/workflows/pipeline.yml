name: GhostBuster CI

on:
  push:
    branches: [ "main" ]

jobs:
  ghostbuster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run GhostBuster Check
        run: python scripts/verify_dependencies.py